<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<style>
    img{
        height: 600px;
        width: 1500px;
    }
    .card{
        margin-top: 10px;

    }
    .main{
        display: flex;
        gap: 100px;
        margin-left: 19px;
    }
    .card-body{
        color: white;
        background-color: rgb(255, 0, 144);
    }
     @media(max-width:1050px){
      body
           {font-family: Georgia, 'Times New Roman', Times, serif;
           background-color: darkcyan;
             color: brown;}
             h1{
              background-color: cornflowerblue;
             }
     }
    
</style>
<body>
    <nav class="navbar navbar-light bg-light justify-content-between">
  <a class="navbar-brand">Nature</a>
  <form class="form-inline">
    <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
    <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
  </form>
</nav>

<div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="./nat1.jpg" class="d-block w-100" alt="sample img">
    </div>
    <div class="carousel-item">
      <img src="./nat2.jpg" class="d-block w-100" alt="sample img">
    </div>
    <div class="carousel-item">
      <img src="./nat3.jpg" class="d-block w-100" alt="sample img">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
<div class="main">
<div class="card" style="width: 18rem;">
  <img style="height: 300px;" src="./nat.jpg" class="card-img-top" alt="sample image">
  <div class="card-body">
    <p class="card-text">Nature always wears the colors of the spirit</p>
  </div>
</div>

<div class="card" style="width: 18rem;">
  <img style="height: 300px;" src="./flower.jpg" class="card-img-top" alt="sample image">
  <div class="card-body">
    <p class="card-text">Bloom with grace,grow through every season.Like flowers,we rise after every rain. 🌷</p>
  </div>
</div>

<div class="card" style="width: 18rem;">
  <img style="height: 300px;" src="./cat.jpg" class="card-img-top" alt="sample image">
  <div class="card-body">
    <p class="card-text">A cat may be small,but it fills your heart in the biggest way.</p>
  </div>
</div>

<div class="card" style="width: 18rem;">
  <img style="height: 300px;" src="./rain.jpg" class="card-img-top" alt="sample image">
  <div class="card-body">
    <p class="card-text">Dancing in the rain,feeling alive again.Rain is not just water,it’s a feeling.</p>
  </div>
</div>
</div>
<footer>
    <div class="card">
  <div style="background-color: coral;" class="card-header">
    Nature
  </div>
  <div  style="background-color: brown; color: aliceblue;" class="card-body">
    <figure>
      <blockquote class="blockquote">
        <p>Nature is not a place,it’s a feeling.In the arms of nature,I find my peace. 🌱Simple moments in naturecreate the best memories.</p>
      </blockquote>
      <figcaption class="blockquote-footer">
        Someone famous in <cite title="Source Title">Source Title</cite>
      </figcaption>
    </figure>
  </div>
</div>
</footer>

    
</body>
</html>
